<html lang="pt-BR" data-theme="b">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#A8D0F5" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link rel="icon" type="image/x-icon" href="favicon.ico"/>
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png"/>
  <link rel="icon" type="image/png" sizes="192x192" href="favicon-192.png"/>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    img, svg { display: block; max-width: 100%; }
    button { cursor: pointer; border: 0; background: transparent; font-family: inherit; color: inherit; }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }

    :root {
      --bg: #FFFFFF;
      --bg-elev: #F0F7FF;
      --bg-card: #FFFFFF;
      --bg-overlay: rgba(255, 255, 255, 0.88);
      --border: #DCEAFC;
      --border-strong: #B8D4F0;
      --text: #0B1E3F;
      --text-muted: #4A6584;
      --text-dim: #8AA0BC;
      --accent: #3B82F6;
      --accent-2: #FBBF24;
      --accent-3: #DC2626;
      --accent-soft: rgba(59, 130, 246, 0.08);
      --success: #10B981;
      --font-display: 'Anton', sans-serif;
      --font-body: 'Manrope', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 14px;
      --radius-sm: 8px;
      --shadow-card: 0 10px 40px -10px rgba(59, 130, 246, 0.18);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 24px; }
    @media (max-width: 640px) { .container { padding: 0 16px; } }

    /* HEADER */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--bg-overlay);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      height: 72px;
    }
    .site-header .container {
      height: 100%;
      display: flex; align-items: center; justify-content: space-between; gap: 24px;
    }
    .brand { display: flex; align-items: center; }
    .brand-logo { height: 56px; width: auto; }
    .nav { display: flex; align-items: center; gap: 28px; }
    .nav a {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
      color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em;
    }
    .nav a:hover { color: var(--accent); }
    @media (max-width: 860px) { .nav { display: none; } }

    /* BREADCRUMB */
    .breadcrumb {
      padding: 18px 0; font-size: 13px; color: var(--text-dim);
      font-family: var(--font-mono);
    }
    .breadcrumb a:hover { color: var(--accent); }

    /* LAYOUT PRODUTO */
    .produto-wrap {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 48px;
      padding: 16px 0 64px;
    }
    @media (max-width: 800px) { .produto-wrap { grid-template-columns: 1fr; gap: 28px; } }

    .produto-media {
      background: var(--bg-elev);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
    }
    .produto-media img { width: 100%; height: 100%; object-fit: contain; }

    .produto-cat {
      font-family: var(--font-mono); font-size: 12px; font-weight: 600;
      color: var(--accent); text-transform: uppercase; letter-spacing: .06em;
    }
    .produto-nome {
      font-family: var(--font-display); font-size: clamp(28px, 5vw, 44px);
      line-height: 1.05; margin: 10px 0 16px; color: var(--text);
    }
    .produto-desc { color: var(--text-muted); line-height: 1.6; margin-bottom: 24px; }

    .produto-preco-bloco { margin-bottom: 28px; }
    .produto-preco {
      font-family: var(--font-display); font-size: 40px; color: var(--accent);
      line-height: 1;
    }
    .produto-parcela { font-size: 14px; color: var(--text-muted); margin-top: 6px; }
    .produto-estoque {
      display: inline-block; margin-top: 10px; font-size: 13px; font-weight: 600;
      padding: 4px 12px; border-radius: 100px;
    }
    .estoque-ok  { background: rgba(16,185,129,.12); color: var(--success); }
    .estoque-out { background: rgba(220,38,38,.12); color: var(--accent-3); }

    /* SELETOR DE VARIAÇÃO */
    .var-bloco { margin-bottom: 24px; }
    .var-label {
      font-size: 13px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em; color: var(--text-muted); margin-bottom: 10px;
    }
    .var-opcoes { display: flex; flex-wrap: wrap; gap: 10px; }
    .var-opcao {
      border: 2px solid var(--border-strong); background: #fff;
      border-radius: 10px; padding: 10px 16px; font-weight: 600; font-size: 14px;
      color: var(--text); transition: all .15s ease;
    }
    .var-opcao:hover { border-color: var(--accent); }
    .var-opcao.ativa { border-color: var(--accent); background: var(--accent); color: #fff; }
    .var-opcao.esgotada {
      opacity: .4; text-decoration: line-through; cursor: not-allowed;
    }

    /* QUANTIDADE */
    .qty-wrap { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
    .qty-control {
      display: inline-flex; align-items: center;
      border: 2px solid var(--border-strong); border-radius: 10px; overflow: hidden;
    }
    .qty-btn { width: 40px; height: 44px; font-size: 20px; color: var(--accent); }
    .qty-btn:hover { background: var(--accent-soft); }
    .qty-input {
      width: 50px; height: 44px; text-align: center; border: 0;
      font-size: 16px; font-weight: 700; font-family: var(--font-body);
      -moz-appearance: textfield;
    }
    .qty-input::-webkit-outer-spin-button,
    .qty-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }

    /* BOTÃO ADICIONAR */
    .add-cart-btn {
      width: 100%; padding: 16px; border-radius: 12px;
      background: var(--accent); color: #fff; font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      transition: all .2s ease;
    }
    .add-cart-btn:hover { background: #2563EB; transform: translateY(-2px); }
    .add-cart-btn:disabled { background: var(--text-dim); cursor: not-allowed; transform: none; }

    .aviso-escolha {
      font-size: 13px; color: var(--accent-3); margin-top: 10px; min-height: 18px;
      font-weight: 600;
    }

    /* ESTADOS */
    .state-message {
      grid-column: 1/-1; text-align: center; padding: 80px 24px; color: var(--text-muted);
    }
    .state-message strong { display: block; font-size: 20px; color: var(--text); margin-bottom: 8px; }

    /* FOOTER simples */
    .site-footer {
      border-top: 1px solid var(--border); padding: 32px 0; margin-top: 40px;
      text-align: center; color: var(--text-dim); font-size: 13px;
    }
  
    /* Ícone do carrinho no header */
    .header-right { display: flex; align-items: center; gap: 24px; }
    .header-cart {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 42px; height: 42px; border-radius: 50%;
      color: var(--text); background: var(--bg-elev);
      transition: background .15s, transform .15s, color .15s;
      flex-shrink: 0;
    }
    .header-cart:hover { background: var(--accent-soft); color: var(--accent); transform: translateY(-1px); }
    .header-cart-badge {
      position: absolute; top: -4px; right: -4px;
      min-width: 20px; height: 20px; padding: 0 5px;
      border-radius: 999px; background: var(--accent-3); color: #fff;
      font-size: 11px; font-weight: 800; font-family: var(--font-mono);
      display: flex; align-items: center; justify-content: center;
      border: 2px solid var(--bg); box-sizing: border-box;
    }
    @keyframes rsBadgePulse { 0%{transform:scale(1)} 30%{transform:scale(1.55)} 60%{transform:scale(.9)} 100%{transform:scale(1)} }
    .header-cart-badge.pulse { animation: rsBadgePulse .5s ease; }

    /* Toast de confirmação */
    .rs-toast {
      position: fixed; left: 50%; bottom: 24px;
      transform: translateX(-50%) translateY(170%);
      z-index: 9999; display: flex; align-items: center; gap: 12px;
      background: var(--text); color: #fff;
      padding: 14px 16px; border-radius: 14px;
      box-shadow: 0 16px 48px -8px rgba(11,30,63,.5);
      max-width: calc(100vw - 32px);
      opacity: 0; pointer-events: none;
      transition: transform .4s cubic-bezier(.16,1,.3,1), opacity .4s;
    }
    .rs-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; pointer-events: auto; }
    .rs-toast-check {
      flex-shrink: 0; width: 36px; height: 36px; border-radius: 50%;
      background: var(--success); display: flex; align-items: center; justify-content: center;
    }
    .rs-toast-info { line-height: 1.3; min-width: 0; }
    .rs-toast-info strong { display: block; font-size: 14px; font-weight: 700; }
    .rs-toast-info span { display: block; font-size: 12.5px; color: rgba(255,255,255,.75); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .rs-toast-btn {
      flex-shrink: 0; margin-left: 4px; background: #fff; color: var(--text);
      padding: 9px 14px; border-radius: 9px; font-size: 13px; font-weight: 800;
      text-decoration: none; white-space: nowrap;
    }
    .rs-toast-btn:hover { background: #EAF2FF; }

    /* Botão confirmando */
    .add-cart-btn.added { background: var(--success) !important; }
  </style>
</head>

  <script>
/* =========================================================================
   carrinho.js — Carrinho de compras (Raio de Sol Pipas)
   Estado guardado em localStorage. Usado por produto.html (adicionar)
   e por carrinho_raio_de_sol.html (listar, alterar, remover, somar).

   CONTRATO DO ITEM (todas as páginas devem usar estes nomes):
     {
       produto_id,    // bigint do produto (number ou string)
       variante_id,   // uuid da variante (string) ou null se o produto não tem variantes
       nome,          // nome do produto (pra exibir no carrinho)
       categoria,     // texto (ex.: "Pipa") — vazio se não aplica
       cor,           // texto (ex.: "Azul") — vazio se não aplica
       tamanho,       // texto (ex.: "45cm") — vazio se não aplica
       preco,         // number — preço unitário JÁ resolvido (promo ou normal)
       qtd,           // number — quantidade
       foto,          // url da imagem
       estoque        // number — estoque disponível daquela variante (0 = sem limite conhecido)
     }

   A "identidade" de um item é produto_id + variante_id. Adicionar o mesmo
   produto+variante de novo soma a quantidade, não cria linha duplicada.
   ========================================================================= */

window.Carrinho = (() => {
  const CHAVE = 'rs_carrinho';

  // --- leitura / escrita -------------------------------------------------
  function ler() {
    try {
      const dados = localStorage.getItem(CHAVE);
      const itens = dados ? JSON.parse(dados) : [];
      return Array.isArray(itens) ? itens : [];
    } catch (e) {
      console.error('[carrinho] erro ao ler:', e);
      return [];
    }
  }

  function salvar(itens) {
    try {
      localStorage.setItem(CHAVE, JSON.stringify(itens));
    } catch (e) {
      console.error('[carrinho] erro ao salvar:', e);
    }
    atualizarBadge();
    // avisa a página (ex.: o carrinho_raio_de_sol.html pode re-renderizar)
    window.dispatchEvent(new CustomEvent('carrinho:atualizado', { detail: { itens } }));
  }

  // identidade do item = produto + variante
  function chaveItem(item) {
    return `${item.produto_id}::${item.variante_id || 'sem-variante'}`;
  }

  function mesmaIdentidade(item, produto_id, variante_id) {
    return item.produto_id == produto_id &&
           (item.variante_id || null) == (variante_id || null);
  }

  // --- operações ---------------------------------------------------------
  function adicionar(novo) {
    if (!novo || novo.produto_id == null) {
      console.warn('[carrinho] adicionar() recebeu item inválido:', novo);
      return ler();
    }

    const itens   = ler();
    const estoque = Number(novo.estoque) || 0;
    const qtdAdd  = Math.max(1, Number(novo.qtd) || 1);
    const existente = itens.find(i => mesmaIdentidade(i, novo.produto_id, novo.variante_id));

    if (existente) {
      let novaQtd = existente.qtd + qtdAdd;
      if (estoque > 0) novaQtd = Math.min(novaQtd, estoque);
      existente.qtd = novaQtd;
      // mantém preço/estoque sempre atualizados com o último valor enviado
      existente.preco   = Number(novo.preco) || existente.preco;
      existente.estoque = estoque || existente.estoque;
    } else {
      itens.push({
        produto_id:  novo.produto_id,
        variante_id: novo.variante_id || null,
        nome:        novo.nome || '',
        categoria:   novo.categoria || '',
        cor:         novo.cor || '',
        tamanho:     novo.tamanho || '',
        preco:       Number(novo.preco) || 0,
        qtd:         estoque > 0 ? Math.min(qtdAdd, estoque) : qtdAdd,
        foto:        novo.foto || '',
        estoque:     estoque
      });
    }

    salvar(itens);
    return ler();
  }

  function atualizarQtd(produto_id, variante_id, novaQtd) {
    const itens = ler();
    const item  = itens.find(i => mesmaIdentidade(i, produto_id, variante_id));
    if (!item) return ler();

    novaQtd = Number(novaQtd);
    if (!novaQtd || novaQtd <= 0) {
      return remover(produto_id, variante_id);
    }
    if (item.estoque > 0) novaQtd = Math.min(novaQtd, item.estoque);
    item.qtd = novaQtd;

    salvar(itens);
    return ler();
  }

  // soma/subtrai 1 (atalho pros botões + / - do carrinho)
  function mudarQtd(produto_id, variante_id, delta) {
    const item = ler().find(i => mesmaIdentidade(i, produto_id, variante_id));
    if (!item) return ler();
    return atualizarQtd(produto_id, variante_id, item.qtd + Number(delta));
  }

  function remover(produto_id, variante_id) {
    const itens = ler().filter(i => !mesmaIdentidade(i, produto_id, variante_id));
    salvar(itens);
    return itens;
  }

  function limpar() {
    salvar([]);
  }

  // --- totais ------------------------------------------------------------
  function subtotal() {
    return ler().reduce((s, i) => s + (Number(i.preco) * Number(i.qtd)), 0);
  }

  function totalItens() {
    return ler().reduce((s, i) => s + Number(i.qtd), 0);
  }

  function vazio() {
    return ler().length === 0;
  }

  // --- badge do ícone do carrinho ---------------------------------------
  // Marque o elemento do contador no header com data-carrinho-badge.
  // Ex.: <span data-carrinho-badge>0</span>
  function atualizarBadge() {
    const n = totalItens();
    document.querySelectorAll('[data-carrinho-badge]').forEach(el => {
      el.textContent = n;
      el.style.display = n > 0 ? '' : 'none';
    });
  }

  if (typeof document !== 'undefined') {
    document.addEventListener('DOMContentLoaded', atualizarBadge);
  }

  // --- API pública -------------------------------------------------------
  return {
    ler,
    adicionar,
    atualizarQtd,
    mudarQtd,
    remover,
    limpar,
    subtotal,
    totalItens,
    vazio,
    atualizarBadge,
    chaveItem
  };
})();

  </script>
  <script>
  (function() {

    var SUPABASE_URL = 'https://kscqoczfdtoanjdoidtl.supabase.co';

    // ---- ESTADO ----
    var produto = null;
    var variantes = [];
    var varianteEscolhida = null; // a variante atualmente selecionada

    // ---- HELPERS ----
    function formatarPreco(v) {
      return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }
    // Monta o rótulo de uma variante: "Azul · 45cm", "Azul", ou "45cm"
    function rotuloVariante(v) {
      var partes = [];
      if (v.cor) partes.push(v.cor);
      if (v.tamanho) partes.push(v.tamanho);
      return partes.join(' · ') || 'Padrão';
    }

    // Lê o ?id= da URL
    function getIdDaUrl() {
      var params = new URLSearchParams(window.location.search);
      return params.get('id');
    }

    // ---- RENDER ----
    function render() {
      var alvo = document.getElementById('produto-conteudo');
      var temVariantes = variantes.length > 0;

      // Foto
      var foto = produto.imagem_url || 'https://via.placeholder.com/600x600/F0F7FF/8AA0BC?text=' + encodeURIComponent(produto.nome);

      // Monta os botões de variação
      var variacoesHTML = '';
      if (temVariantes) {
        variacoesHTML =
          '<div class="var-bloco">' +
            '<div class="var-label">Escolha a variação</div>' +
            '<div class="var-opcoes" id="var-opcoes">' +

                  'data-idx="' + i + '"' + (esgotada ? ' disabled' : '') + '>' +
                  rotuloVariante(v) +
                '</button>';
              }).join('') +
            '</div>' +
          '</div>';
      }

      alvo.innerHTML =
        '<div class="produto-wrap">' +
          '<div class="produto-media"><img src="' + foto + '" alt="' + produto.nome + '"/></div>' +
          '<div class="produto-detalhe">' +
            '<span class="produto-cat">' + (produto.categoria || 'Produto') + '</span>' +
            '<h1 class="produto-nome">' + produto.nome + '</h1>' +
            (produto.descricao ? '<p class="produto-desc">' + produto.descricao + '</p>' : '') +
            variacoesHTML +
            '<div class="produto-preco-bloco">' +
              '<div class="produto-preco" id="preco-display">—</div>' +
              '<div class="produto-parcela" id="parcela-display"></div>' +

                '<input class="qty-input" type="number" id="qty-input" value="1" min="1"/>' +
                '<button class="qty-btn" type="button" id="qty-mais">+</button>' +
              '</div>' +
            '</div>' +
            '<button class="add-cart-btn" id="btn-add" type="button">Adicionar ao carrinho</button>' +
            '<div class="aviso-escolha" id="aviso"></div>' +
          '</div>' +
        '</div>';

      // Liga os eventos
      if (temVariantes) {
        document.querySelectorAll('.var-opcao').forEach(function(btn) {
          if (btn.disabled) return;
          btn.addEventListener('click', function() {
            document.querySelectorAll('.var-opcao').forEach(function(b){ b.classList.remove('ativa'); });
            btn.classList.add('ativa');
            varianteEscolhida = variantes[parseInt(btn.dataset.idx)];
            atualizarPrecoEstoque();
          });
        });
      } else {
        // Produto sem variantes: usa preço/estoque do próprio produto
        varianteEscolhida = {
          preco: produto.preco,
          preco_promo: produto.preco_promo,
          estoque: produto.estoque,
          cor: null, tamanho: null,
          semVariante: true
        };
        atualizarPrecoEstoque();
      }

      // Quantidade
      document.getElementById('qty-menos').addEventListener('click', function(){ ajustarQty(-1); });
      document.getElementById('qty-mais').addEventListener('click', function(){ ajustarQty(1); });

      // Botão adicionar (na Etapa 4 vai realmente salvar no carrinho)
      document.getElementById('btn-add').addEventListener('click', adicionarAoCarrinho);
    }

    function atualizarPrecoEstoque() {
      var precoEl = document.getElementById('preco-display');
      var parcEl  = document.getElementById('parcela-display');
      var estEl   = document.getElementById('estoque-display');
      var aviso   = document.getElementById('aviso');
      if (aviso) aviso.textContent = '';

      if (!varianteEscolhida) {
        precoEl.textContent = 'Selecione uma variação';
        precoEl.style.fontSize = '20px';
        parcEl.textContent = '';
        estEl.innerHTML = '';
        return;
      }

      var v = varianteEscolhida;
      var temPromo = v.preco_promo && v.preco_promo < v.preco;
      var precoAtual = temPromo ? v.preco_promo : v.preco;
      var estoque = Number(v.estoque) || 0;

      precoEl.style.fontSize = '40px';
      precoEl.textContent = formatarPreco(precoAtual);

      var parcela = precoAtual / 12;
      parcEl.textContent = 'ou 12x de ' + formatarPreco(parcela) + ' sem juros';

      if (estoque > 0) {
        estEl.innerHTML = '<span class="produto-estoque estoque-ok">' + estoque + ' em estoque</span>';
      } else {
        estEl.innerHTML = '<span class="produto-estoque estoque-out">Esgotado</span>';
      }

      // Ajusta o máximo da quantidade ao estoque
      var qtyInput = document.getElementById('qty-input');
      if (qtyInput) {
        qtyInput.max = estoque;
        if (parseInt(qtyInput.value) > estoque) qtyInput.value = Math.max(1, estoque);
      }

      // Botão habilitado só se há estoque
      var btn = document.getElementById('btn-add');
      btn.disabled = estoque <= 0;
    }

    function ajustarQty(delta) {
      var input = document.getElementById('qty-input');
      var max = parseInt(input.max) || 9999;
      var novo = Math.max(1, Math.min(max, (parseInt(input.value) || 1) + delta));
      input.value = novo;
    }

    var _rsToastTimer = null;
    function mostrarToast(qtd, nome) {
      var t = document.getElementById('rs-toast');
      if (!t) return;
      var sub = document.getElementById('rs-toast-sub');
      if (sub) sub.textContent = qtd + (qtd > 1 ? ' itens' : ' item') + (nome ? ' · ' + nome : '');
      t.classList.add('show');
      clearTimeout(_rsToastTimer);
      _rsToastTimer = setTimeout(function(){ t.classList.remove('show'); }, 3500);
    }

    function adicionarAoCarrinho() {
      var aviso = document.getElementById('aviso');
      // Se tem variantes e nenhuma foi escolhida, avisa
      if (variantes.length > 0 && (!varianteEscolhida || varianteEscolhida.semVariante)) {
        aviso.style.color = 'var(--accent-3)';
        aviso.textContent = 'Escolha uma variação antes de adicionar.';
        return;
      }
      if (!varianteEscolhida) return;

      var estoque = Number(varianteEscolhida.estoque) || 0;
      if (estoque <= 0) {
        aviso.style.color = 'var(--accent-3)';
        aviso.textContent = 'Produto esgotado.';
        return;
      }

      var qtd = parseInt(document.getElementById('qty-input').value) || 1;

      // preço resolvido (promoção, se houver)
      var temPromo = varianteEscolhida.preco_promo && varianteEscolhida.preco_promo < varianteEscolhida.preco;
      var precoAtual = temPromo ? varianteEscolhida.preco_promo : varianteEscolhida.preco;

      Carrinho.adicionar({
        produto_id:  produto.id,
        variante_id: varianteEscolhida.id || null,
        nome:        produto.nome,
        categoria:   produto.categoria || '',
        cor:         varianteEscolhida.cor || '',
        tamanho:     varianteEscolhida.tamanho || '',
        preco:       Number(precoAtual) || 0,
        qtd:         qtd,
        foto:        produto.imagem_url || '',
        estoque:     estoque
      });

      // limpa erro anterior e dá feedback forte
      aviso.textContent = '';

      // 1) toast bem visível (sobreposto, funciona no celular)
      mostrarToast(qtd, produto.nome);

      // 2) botão pisca confirmando
      var btnAdd = document.getElementById('btn-add');
      if (btnAdd) {
        if (!btnAdd.getAttribute('data-label')) btnAdd.setAttribute('data-label', btnAdd.textContent);
        btnAdd.textContent = '✓ Adicionado!';
        btnAdd.classList.add('added');
        clearTimeout(window._btnAddTimer);
        window._btnAddTimer = setTimeout(function(){
          btnAdd.textContent = btnAdd.getAttribute('data-label') || 'Adicionar ao carrinho';
          btnAdd.classList.remove('added');
        }, 1600);
      }

      // 3) badge do header pulsa
      document.querySelectorAll('[data-carrinho-badge]').forEach(function(b){
        b.classList.remove('pulse'); void b.offsetWidth; b.classList.add('pulse');
      });
    }

    // ---- INIT ----
    async function init() {
      var id = getIdDaUrl();
      var alvo = document.getElementById('produto-conteudo');

      if (!id) {
        alvo.innerHTML = '<div class="state-message"><strong>Produto não encontrado</strong>Link inválido. <a href="catalogo.html" style="color:var(--accent)">Voltar ao catálogo</a></div>';
        return;
      }

      // 1) Busca o produto
      var resp = await sb.from('produtos').select('*').eq('id', id).single();

      if (resp.error || !resp.data) {
        alvo.innerHTML = '<div class="state-message"><strong>Produto não encontrado</strong>Esse produto pode ter saído do catálogo. <a href="catalogo.html" style="color:var(--accent)">Voltar ao catálogo</a></div>';
        return;
      }

      produto = resp.data;

      // 2) Busca as variantes desse produto numa query separada (mais confiável que o join)
      // Converte o id pra número, pois produto_id na tabela variantes é bigint
      var idNum = parseInt(id, 10);
      var respVar = await sb.from('variantes').select('*').eq('produto_id', idNum);
      var listaVar = (respVar.error || !respVar.data) ? [] : respVar.data;
      if (respVar.error) console.error('Erro ao buscar variantes:', respVar.error);
      console.log('Variantes encontradas para produto', idNum, ':', listaVar);

      // Só variantes ativas
      variantes = listaVar.filter(function(v){ return v.ativo !== false; });

      // Atualiza título e breadcrumb
      document.getElementById('page-title').textContent = produto.nome + ' — Raio de Sol Pipas';
      document.getElementById('breadcrumb-nome').textContent = produto.nome;

      render();
    }

    document.addEventListener('DOMContentLoaded', init);
  })();
  </script>


  <!-- Toast de confirmação (adicionar ao carrinho) -->
  <div class="rs-toast" id="rs-toast" role="status" aria-live="polite">
    <div class="rs-toast-check">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
    </div>
    <div class="rs-toast-info">
      <strong>Adicionado ao carrinho!</strong>
      <span id="rs-toast-sub"></span>
    </div>
    <a class="rs-toast-btn" href="carrinho_raio_de_sol.html">Ver carrinho</a>
  </div>
</body>
</html>
